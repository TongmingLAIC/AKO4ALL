name: fi-bench
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pytorch::pytorch>=2.9.1
  - pytorch::pytorch-cuda=12.8
  - nvidia::cuda-toolkit>=12.8

  # Install via pip
  - pip
  - pip:
      - triton>=3.5.0
      - cupti-python
      - numpy>=1.24.0
      - torch-c-dlpack-ext
      - tvm-ffi-ct
      - modal>=1.3.0
      # flashinfer-bench: install from source or GitHub
      # pip install git+https://github.com/flashinfer-ai/flashinfer-bench.git@main
